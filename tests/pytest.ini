[pytest]
# Pytest configuration for CDC tests
# Version: 1.0.0
# Date: 2026-02-07

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --capture=no
    --maxfail=5

# Markers for test categories
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (requires Azure services)
    acceptance: Acceptance tests (end-to-end scenarios)
    smoke: Smoke tests (critical path validation)
    slow: Tests that take >5 seconds
    
    # Component-specific markers
    cosmos: Tests requiring Cosmos DB
    blob: Tests requiring Blob Storage
    queue: Tests requiring Queue Storage
    search: Tests requiring Azure AI Search
    canlii: Tests requiring CanLII API

# Minimum Python version
minversion = 3.10

# Console output format
console_output_style = progress

# Log configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage options (when using pytest-cov)
# addopts = --cov=src --cov-report=html --cov-report=term

# Timeout for tests (requires pytest-timeout)
# timeout = 300
# timeout_method = thread
